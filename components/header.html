<header x-data="{ open: false }" class="sticky top-0 z-50 bg-primary shadow-lg">
  <div class="container">
    <div class="flex h-16 items-center justify-between md:h-20">

      <!-- Logo -->
      <a href="/" aria-label="Rick's AC — Home" class="flex items-center gap-1.5">
        <span class="text-xl font-extrabold tracking-wide text-white">Rick's<span class="text-accent"> AC</span></span>
        <span class="hidden text-xs font-medium uppercase tracking-widest text-white/50 sm:block">Maintenance &amp; Service</span>
      </a>

      <!-- Desktop nav -->
      <nav aria-label="Main navigation" class="hidden items-center gap-8 md:flex">
        <a href="#services" class="text-sm font-medium text-white/80 transition duration-200 hover:text-white">Services</a>
        <a href="#about" class="text-sm font-medium text-white/80 transition duration-200 hover:text-white">About</a>
        <a href="#why-choose-us" class="text-sm font-medium text-white/80 transition duration-200 hover:text-white">Why Us</a>
        <a href="#contact" class="text-sm font-medium text-white/80 transition duration-200 hover:text-white">Contact</a>
      </nav>

      <!-- CTA + hamburger -->
      <div class="flex items-center gap-3">
        <a
          href="tel:5045825111"
          class="hidden rounded-full bg-accent px-5 py-2.5 text-sm font-bold text-white transition duration-200 hover:bg-accent-dark focus-visible:ring-2 focus-visible:ring-white focus-visible:ring-offset-2 focus-visible:ring-offset-primary focus-visible:outline-none md:inline-flex"
        >
          Call 504-582-5111
        </a>

        <!-- Hamburger toggle -->
        <button
          @click="open = !open"
          :aria-expanded="open.toString()"
          aria-controls="mobile-menu"
          aria-label="Toggle navigation menu"
          type="button"
          class="flex h-11 w-11 items-center justify-center rounded-lg text-white transition duration-200 hover:bg-white/10 focus-visible:outline focus-visible:outline-2 focus-visible:outline-white md:hidden"
        >
          <svg x-show="!open" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
          </svg>
          <svg x-show="open" x-cloak xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
      </div>

    </div>
  </div>

  <!-- Mobile menu -->
  <div
    id="mobile-menu"
    x-show="open"
    x-cloak
    x-transition:enter="transition duration-200 ease-out"
    x-transition:enter-start="opacity-0 -translate-y-1"
    x-transition:enter-end="opacity-100 translate-y-0"
    x-transition:leave="transition duration-150 ease-in"
    x-transition:leave-start="opacity-100 translate-y-0"
    x-transition:leave-end="opacity-0 -translate-y-1"
    class="border-t border-white/10 bg-primary-dark md:hidden"
  >
    <nav aria-label="Mobile navigation" class="container flex flex-col gap-1 py-4">
      <a @click="open = false" href="#services" class="rounded-lg px-4 py-3 text-sm font-medium text-white/90 transition duration-200 hover:bg-white/10 hover:text-white">Services</a>
      <a @click="open = false" href="#about" class="rounded-lg px-4 py-3 text-sm font-medium text-white/90 transition duration-200 hover:bg-white/10 hover:text-white">About</a>
      <a @click="open = false" href="#why-choose-us" class="rounded-lg px-4 py-3 text-sm font-medium text-white/90 transition duration-200 hover:bg-white/10 hover:text-white">Why Us</a>
      <a @click="open = false" href="#contact" class="rounded-lg px-4 py-3 text-sm font-medium text-white/90 transition duration-200 hover:bg-white/10 hover:text-white">Contact</a>
      <div class="mt-3 border-t border-white/10 pt-3">
        <a
          href="tel:5045825111"
          class="flex items-center justify-center rounded-full bg-accent px-5 py-3 text-sm font-bold text-white transition duration-200 hover:bg-accent-dark"
        >
          Call 504-582-5111
        </a>
      </div>
    </nav>
  </div>
</header>
